name: CI

on:
  # push:
  #   branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    # Apple Silicon (M-series) runner — required for the Xcode version in versions.json
    runs-on: macos-15
    permissions:
      contents: write   # allow creating the Release from the default GITHUB_TOKEN

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          set -x
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          XCODE_APP="/Applications/Xcode_$XCODE_VERSION.app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "Xcode $XCODE_VERSION not found on this runner. Available Xcode installs:"
            ls -d /Applications/Xcode*.app || true
            # fall back to the newest Xcode present on the runner
            XCODE_APP=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
            echo "Falling back to $XCODE_APP"
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --overrideXcodeVersion \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          # collect ipa (locate it robustly; the bazel-out fragment name is not stable)
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          # the product is named Swiftgram.ipa in this fork; skip the .runfiles duplicate
          IPA_PATH=$(find -L bazel-out -type f -name '*.ipa' -path '*/bin/Telegram/*' ! -path '*.runfiles/*' | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No .ipa found under the expected path. All .ipa files:"
            find -L bazel-out -name '*.ipa' || true
            exit 1
          fi
          echo "Found ipa at: $IPA_PATH"
          cp "$IPA_PATH" "$OUTPUT_PATH/Telegram.ipa"

          # collect dsym
          mkdir -p build/DSYMs
          for d in $(find -L bazel-out -type d -name '*.dSYM' -path '*/bin/Telegram/*' ! -path '*.runfiles/*'); do
            cp -R "$d" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null || true

      # Safety net: attach the ipa to the run itself, independent of the Release steps.
      # Even if creating the GitHub Release fails, the ipa stays downloadable from this run.
      - name: Upload ipa as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-ipa
          path: /Users/Shared/telegram-ios/build/artifacts/*.ipa
          if-no-files-found: error

      # Use the gh CLI (preinstalled on the runner) instead of the deprecated
      # actions/create-release. Idempotent across re-runs; dSYM optional.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          cd /Users/Shared/telegram-ios
          TAG="build-${BUILD_NUMBER}"
          gh release create "$TAG" \
            --title "Telegram ${APP_VERSION} (${BUILD_NUMBER})" \
            --notes "An unsigned build of Telegram for iOS ${APP_VERSION} (${BUILD_NUMBER})" \
            --repo "$GITHUB_REPOSITORY" || echo "Release $TAG may already exist; uploading assets."
          gh release upload "$TAG" build/artifacts/Telegram.ipa --clobber --repo "$GITHUB_REPOSITORY"
          if [ -f build/artifacts/Telegram.DSYMs.zip ]; then
            gh release upload "$TAG" build/artifacts/Telegram.DSYMs.zip --clobber --repo "$GITHUB_REPOSITORY"
          fi
